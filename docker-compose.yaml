services:
  main_db:
    image: postgres:16
    container_name: my_postgres
    environment:
      POSTGRES_DB: database
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - metabase_db_data:/var/lib/postgresql/data
    restart: unless-stopped

  metabase:
    image: metabase/metabase:latest # Use a specific version tag in production
    container_name: metabase
    depends_on:
      - main_db
    ports:
      - "3000:3000"
    volumes:
      # Optional: to potentially speed up startup by mapping /dev/urandom
      - "/dev/urandom:/dev/random:ro"
    restart: unless-stopped

volumes:
  metabase_db_data: